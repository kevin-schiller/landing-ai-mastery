name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          envs: GHCR_PAT
          script: |
            echo "$GHCR_PAT" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Blue-green: démarrer le nouveau container sur un port temporaire
            docker run -d \
              --name ai-mastery-new \
              --restart unless-stopped \
              -p 9091:3000 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Health check progressif
            for i in $(seq 1 10); do
              curl -sf http://localhost:9091 && break
              sleep 2
            done

            # Bascule : arrêter l'ancien, renommer le nouveau
            docker stop ai-mastery || true
            docker rm ai-mastery || true
            docker rename ai-mastery-new ai-mastery
            curl -sf http://localhost:9090 || exit 1
